                    <span>模特</span>
                    <span id="lightbox-meta-model">—</span>
                </div>
                <div class="lightbox-meta-row">
                    <span>序号</span>
                    <span id="lightbox-meta-index">01</span>
                </div>
            </div>

            <div class="collection-list" id="collection-list">
                <div class="collection-list-label">同系列</div>
                <div class="collection-thumbs" id="collection-thumbs"></div>
            </div>
        </aside>
    </div>

    <button class="back-top focus-ring" id="back-top" type="button" aria-label="顶部">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" aria-hidden="true">
            <path d="M6 14l6-6 6 6"></path>
        </svg>
    </button>

    <div class="toast" id="toast" role="status" aria-live="polite"></div>

    <script>
        "use strict";

        /* =========================================================
           01. 作品配置中心

           使用方法：
           1. 把图片放入 photos/ 文件夹，网站会自动加载显示
           2. 也可以通过网页界面手动添加图片（拖放或选择文件）
           3. 画幅以真实图片为准：上传后程序会读取每张图片的
              naturalWidth / naturalHeight，自动写入 --work-aspect，
              无需手动指定（aspectRatio 仅作为图片尚未加载时的占位）
           4. title / model / collectionName / searchTerms / description
              可后续在 GALLERY_CONFIG 中按需填写（默认都留空）
           5. 同一个 collectionId 的作品，会在大图预览中归为同一系列
           ========================================================= */
        const GALLERY_CONFIG = [];

        /* =========================================================
           02. DOM 引用与基础状态
           ========================================================= */
        const body = document.body;
        const root = document.documentElement;
        const siteHeader = document.getElementById("site-header");
        const galleryGrid = document.getElementById("gallery-grid");
        const resultCount = document.getElementById("result-count");
        const emptyState = document.getElementById("empty-state");
        const searchBox = document.getElementById("search-box");
        const searchInput = document.getElementById("search-input");
        const searchClear = document.getElementById("search-clear");
        const searchShortcut = document.getElementById("search-shortcut");
        const searchPanel = document.getElementById("search-panel");
        const searchPanelCount = document.getElementById("search-panel-count");
        const searchResults = document.getElementById("search-results");
        const heroSearchButton = document.getElementById("hero-search-button");
        const backTop = document.getElementById("back-top");
        const toast = document.getElementById("toast");

        const lightbox = document.getElementById("lightbox");
        const lightboxClose = document.getElementById("lightbox-close");
        const lightboxPrev = document.getElementById("lightbox-prev");
        const lightboxNext = document.getElementById("lightbox-next");
        const lightboxPosition = document.getElementById("lightbox-position");
        const lightboxMediaWrap = document.getElementById("lightbox-media-wrap");
        const lightboxImage = document.getElementById("lightbox-image");
        const lightboxPlaceholder = document.getElementById("lightbox-placeholder");
        const lightboxCollection = document.getElementById("lightbox-collection");
        const lightboxTitle = document.getElementById("lightbox-title");
        const lightboxModel = document.getElementById("lightbox-model");
        const lightboxDescription = document.getElementById("lightbox-description");
        const lightboxMetaSeries = document.getElementById("lightbox-meta-series");
        const lightboxMetaModel = document.getElementById("lightbox-meta-model");
        const lightboxMetaIndex = document.getElementById("lightbox-meta-index");
        const collectionList = document.getElementById("collection-list");
        const collectionThumbs = document.getElementById("collection-thumbs");

        const addButton = document.getElementById("add-button");
        const mediaManager = document.getElementById("media-manager");
        const mediaManagerClose = document.getElementById("media-manager-close");
        const mediaManagerCancel = document.getElementById("media-manager-cancel");
        const mediaManagerConfirm = document.getElementById("media-manager-confirm");
        const uploadArea = document.getElementById("upload-area");
        const fileInput = document.getElementById("file-input");
        const photosGrid = document.getElementById("photos-grid");

        const state = {
            query: "",
            visibleItems: [...GALLERY_CONFIG],
            currentIndex: 0,
            lastFocusedElement: null,
            toastTimer: null,
            selectedPhotos: []
        };

        const collectionMap = GALLERY_CONFIG.reduce((map, item) => {
            const key = item.collectionId || item.id;
            if (!map[key]) {
                map[key] = [];
            }
            map[key].push(item);
            return map;
        }, {});

        /* =========================================================
           03. 工具函数
           ========================================================= */
        function escapeHTML(value) {
            return String(value ?? "")
                .replaceAll("&", "&amp;")
                .replaceAll("<", "&lt;")
                .replaceAll(">", "&gt;")
                .replaceAll('"', "&quot;")
                .replaceAll("'", "&#039;");
        }

        function normalize(value) {
            return String(value ?? "").trim().toLowerCase();
        }

        function padNumber(number) {
            return String(number).padStart(2, "0");
        }

        function getItemIndex(item) {
            return GALLERY_CONFIG.findIndex(entry => entry.id === item.id);
        }

        function getSearchText(item) {
            return normalize([
                item.title,
                item.model,
                item.collectionName,
                item.searchTerms,
                item.description
            ].filter(Boolean).join(" "));
        }

        function getPaletteStyle(item) {
            const palette = item.palette || {};
            return [
                `--placeholder-a:${palette.a || "#2b3035"}`,
                `--placeholder-b:${palette.b || "#151517"}`,
                `--placeholder-c:${palette.c || "#09090a"}`,
                `--light-color:${palette.light || "rgba(255,226,175,.26)"}`,
                `--light-x:${palette.x || "72%"}`,
                `--light-y:${palette.y || "28%"}`,
                `--placeholder-angle:${palette.angle || "135deg"}`,
                `--beam-angle:${palette.beam || "-18deg"}`
            ].join(";");
        }

        function createPlaceholderMarkup(item) {
            return `
                <div class="work-placeholder" style="${getPaletteStyle(item)}"></div>
            `;
        }

        /* =========================================================
           04. 动态画幅检测（以真实图片为准）
           ========================================================= */
        const aspectCache = new Map();

        function detectImageAspect(src) {
            if (!src) return Promise.resolve(null);
            if (aspectCache.has(src)) return Promise.resolve(aspectCache.get(src));

            return new Promise(resolve => {
                const probe = new Image();
                probe.onload = () => {
                    const ratio = `${probe.naturalWidth || 1} / ${probe.naturalHeight || 1}`;
                    aspectCache.set(src, ratio);
                    resolve(ratio);
                };
                probe.onerror = () => resolve(null);
                probe.src = src;
            });
        }

        function applyAspectRatio(card, ratio) {
            if (!card || !ratio) return;
            card.style.setProperty("--work-aspect", ratio);
        }

        function createSearchThumb(item) {
            if (item.src) {
                return `<img src="${escapeHTML(item.src)}" alt="" loading="lazy">`;
            }
            return `<div class="collection-thumb-placeholder" style="${getPaletteStyle(item)}"></div>`;
        }

        function showToast(message) {
            toast.textContent = message;
            toast.classList.add("is-visible");
            window.clearTimeout(state.toastTimer);
            state.toastTimer = window.setTimeout(() => {
                toast.classList.remove("is-visible");
            }, 1800);
        }

        /* =========================================================
           05. 作品卡片
           ========================================================= */
        function createWorkCard(item, index) {
            const title = item.title || `作品 ${padNumber(index + 1)}`;
            const aspectRatio = item.aspectRatio || "1/1";

            const media = item.src
                ? `<img class="work-image" src="${escapeHTML(item.src)}" alt="${escapeHTML(title)}" loading="lazy">`
                : createPlaceholderMarkup(item);

            return `
                <article
                    class="work-card focus-ring"
                    data-id="${escapeHTML(item.id)}"
                    style="--work-aspect: ${escapeHTML(aspectRatio)};"
                    tabindex="0"
                    role="button"
                    aria-label="${escapeHTML(title)}"
                >
                    <div class="work-card-inner">
                        <div class="work-media">
                            ${media}
                            <div class="work-overlay">
                                <span class="work-overlay-icon" aria-hidden="true">
                                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                                        <path d="M3 21v-4M3 17l6-6 4 4 8-8M14 7h7v7"></path>
                                    </svg>
                                </span>
                            </div>
                        </div>
                    </div>
                </article>
            `;
        }

        function renderGallery() {
            galleryGrid.innerHTML = GALLERY_CONFIG.map(createWorkCard).join("");

            galleryGrid.querySelectorAll(".work-card").forEach(card => {
                const openCard = () => {
                    const item = GALLERY_CONFIG.find(entry => entry.id === card.dataset.id);
                    if (item) {
                        openLightbox(item);
                    }
                };

                card.addEventListener("click", openCard);
                card.addEventListener("keydown", event => {
                    if (event.key === "Enter" || event.key === " ") {
                        event.preventDefault();
                        openCard();
                    }
                });
            });

            requestAnimationFrame(() => {
                observeWorkCards();
                applyFilters();
                detectGalleryAspects();
            });
        }

        function detectGalleryAspects() {
            GALLERY_CONFIG.forEach(item => {
                if (!item.src) return;
                const card = galleryGrid.querySelector(`[data-id="${CSS.escape(item.id)}"]`);
                if (!card) return;

                detectImageAspect(item.src).then(ratio => {
                    if (ratio) applyAspectRatio(card, ratio);
                });
            });
        }

        function applyFilters() {
            const query = normalize(state.query);
            const cards = [...galleryGrid.querySelectorAll(".work-card")];
            let visibleCount = 0;

            state.visibleItems = GALLERY_CONFIG.filter(item => {
                const queryMatch = !query || getSearchText(item).includes(query);
                return queryMatch;
            });

            const visibleIds = new Set(state.visibleItems.map(item => item.id));

            cards.forEach(card => {
                const visible = visibleIds.has(card.dataset.id);
                card.classList.toggle("is-hidden", !visible);
                if (visible) {
                    visibleCount += 1;
                }
            });

            resultCount.textContent = String(visibleCount);
            emptyState.classList.toggle("is-visible", visibleCount === 0);
            renderSearchResults();
        }

        /* =========================================================
           06. 搜索
           ========================================================= */
        function getSearchMatches() {
            const query = normalize(state.query);
            if (!query) {
                return [...GALLERY_CONFIG];
            }
            return GALLERY_CONFIG.filter(item => getSearchText(item).includes(query));
        }

        function renderSearchResults() {
            const matches = getSearchMatches();
            searchPanelCount.textContent = state.query
                ? `${matches.length} 项`
                : `共 ${GALLERY_CONFIG.length}`;

            if (matches.length === 0) {
                searchResults.innerHTML = `
                    <div class="search-empty">
                        <div class="search-empty-icon" aria-hidden="true"></div>
                        <strong>无</strong>
                        <span>换关键词</span>
                    </div>
                `;
                return;
            }

            searchResults.innerHTML = matches.map(item => {
                const itemIndex = getItemIndex(item);
                return `
                    <button class="search-result-item focus-ring" type="button" data-search-id="${escapeHTML(item.id)}">
                        <span class="search-result-thumb">
                            ${createSearchThumb(item)}
                        </span>
                        <span class="search-result-copy">
                            <span class="search-result-title">${escapeHTML(item.title || `作品 ${padNumber(itemIndex + 1)}`)}</span>
                            <span class="search-result-meta">—</span>
                        </span>
                        <svg class="search-result-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" aria-hidden="true">
                            <path d="M5 12h14M14 7l5 5-5 5"></path>
                        </svg>
                    </button>
                `;
            }).join("");

            searchResults.querySelectorAll("[data-search-id]").forEach(button => {
                button.addEventListener("click", () => {
                    const item = GALLERY_CONFIG.find(entry => entry.id === button.dataset.searchId);
                    if (!item) return;

                    applyFilters();
                    closeSearchPanel();

                    const card = galleryGrid.querySelector(`[data-id="${CSS.escape(item.id)}"]`);
                    if (card) {
                        card.scrollIntoView({ behavior: "smooth", block: "center" });
                        card.animate(
                            [
                                { transform: "translateY(0) scale(.985)" },
                                { transform: "translateY(-5px) scale(1.012)" },
                                { transform: "translateY(0) scale(1)" }
                            ],
                            { duration: 850, easing: "cubic-bezier(.16,1,.3,1)" }
                        );
                    }
                });
            });
        }

        function openSearchPanel() {
            searchPanel.classList.add("is-open");
            renderSearchResults();
        }

        function closeSearchPanel() {
            searchPanel.classList.remove("is-open");
        }

        function focusSearch() {
            searchBox.classList.add("is-active");
            searchInput.focus();
            searchInput.select();
            openSearchPanel();
        }

        function blurSearch() {
            if (window.matchMedia("(max-width: 720px)").matches && !state.query) {
                searchBox.classList.remove("is-active");
            }
        }

        function clearSearch() {
            searchInput.value = "";
            state.query = "";
            searchClear.classList.remove("is-visible");
            searchShortcut.hidden = false;
            applyFilters();
            if (window.matchMedia("(max-width: 720px)").matches) {
                searchBox.classList.remove("is-active");
                searchInput.blur();
            }
        }

        searchInput.addEventListener("input", () => {
            state.query = searchInput.value;
            searchClear.classList.toggle("is-visible", Boolean(searchInput.value));
            searchShortcut.hidden = Boolean(searchInput.value);
            openSearchPanel();
            applyFilters();
        });

        searchInput.addEventListener("focus", () => {
            searchBox.classList.add("is-active");
            openSearchPanel();
        });

        searchInput.addEventListener("blur", blurSearch);

        searchInput.addEventListener("keydown", event => {
            if (event.key === "Escape") {
                if (state.query) {
                    clearSearch();
                } else {
                    closeSearchPanel();
                    searchInput.blur();
                }
            }

            if (event.key === "Enter") {
                const firstMatch = getSearchMatches()[0];
                if (firstMatch) {
                    const resultButton = searchResults.querySelector(`[data-search-id="${CSS.escape(firstMatch.id)}"]`);
                    resultButton?.click();
                }
            }
        });

        searchClear.addEventListener("click", () => {
            clearSearch();
            focusSearch();
        });

        heroSearchButton.addEventListener("click", focusSearch);

        searchBox.addEventListener("click", event => {
            if (window.matchMedia("(max-width: 720px)").matches && !searchBox.classList.contains("is-active")) {
                event.preventDefault();
                focusSearch();
            }
        });

        document.addEventListener("click", event => {
            if (!searchBox.contains(event.target)) {
                closeSearchPanel();
                if (window.matchMedia("(max-width: 720px)").matches && !state.query) {
                    searchBox.classList.remove("is-active");
                }
            }
        });

        document.addEventListener("keydown", event => {
            const isShortcut = (event.ctrlKey || event.metaKey) && event.key.toLowerCase() === "k";
            const slashShortcut = event.key === "/" && document.activeElement?.tagName !== "INPUT";

            if (isShortcut || slashShortcut) {
                event.preventDefault();
                focusSearch();
            }
        });

        /* =========================================================
           07. 媒体管理器
           ========================================================= */
        function openMediaManager() {
            state.lastFocusedElement = document.activeElement;
            mediaManager.classList.add("is-open");
            mediaManager.setAttribute("aria-hidden", "false");
            body.classList.add("is-locked");
            state.selectedPhotos = [];
            updateConfirmButton();
            loadPhotosFromFolder();
        }

        function closeMediaManager() {
            mediaManager.classList.remove("is-open");
            mediaManager.setAttribute("aria-hidden", "true");
            body.classList.remove("is-locked");
            state.lastFocusedElement?.focus?.({ preventScroll: true });
            state.selectedPhotos = [];
            updateConfirmButton();
        }

        function updateConfirmButton() {
            mediaManagerConfirm.disabled = state.selectedPhotos.length === 0;
        }

        function loadPhotosFromFolder() {
            const imageExtensions = ["jpg", "jpeg", "png", "gif", "webp"];
            const photoFiles = [];

            fetch("photos/")
                .then(response => response.text())
                .then(html => {
                    const parser = new DOMParser();
                    const doc = parser.parseFromString(html, "text/html");
                    const links = doc.querySelectorAll("a");

                    links.forEach(link => {
                        const href = link.getAttribute("href");
                        if (href && !href.startsWith("..") && !href.startsWith("/")) {
                            const ext = href.split(".").pop()?.toLowerCase();
                            if (imageExtensions.includes(ext)) {
                                photoFiles.push(href);
                            }
                        }
                    });

                    renderPhotosGrid(photoFiles);
                })
                .catch(() => {
                    photosGrid.innerHTML = `
                        <div style="text-align: center; padding: 28px; color: var(--muted-dark); font-size: 9px;">
                            <p>无法访问 photos 文件夹</p>
                            <p style="margin-top: 8px;">请确保服务器已启动或图片已放置在 photos 目录中</p>
                        </div>
                    `;
                });
        }

        function renderPhotosGrid(files) {
            if (files.length === 0) {
                photosGrid.innerHTML = `
                    <div style="text-align: center; padding: 28px; color: var(--muted-dark); font-size: 9px;">
                        <p>photos 文件夹中暂无图片</p>
                        <p style="margin-top: 8px;">请先将图片放入 photos 文件夹</p>
                    </div>
                `;
                return;
            }

            photosGrid.innerHTML = files.map(file => {
                const isSelected = state.selectedPhotos.includes(file);
                return `
                    <div
                        class="photo-item ${isSelected ? "is-selected" : ""}"
                        data-photo-path="${escapeHTML(file)}"
                    >
                        <img src="${escapeHTML("photos/" + file)}" alt="${escapeHTML(file)}" loading="lazy">
                        <div class="photo-item-info">
                            <span class="photo-item-name">${escapeHTML(file)}</span>
                        </div>
                    </div>
                `;
            }).join("");

            photosGrid.querySelectorAll(".photo-item").forEach(item => {
                item.addEventListener("click", () => {
                    const path = item.dataset.photoPath;
                    const index = state.selectedPhotos.indexOf(path);

                    if (index > -1) {
                        state.selectedPhotos.splice(index, 1);
                        item.classList.remove("is-selected");
                    } else {
                        state.selectedPhotos.push(path);
                        item.classList.add("is-selected");
                    }

                    updateConfirmButton();
                });
            });
        }

        function handleFileSelect(event) {
            const files = Array.from(event.target.files || []);
            const imageFiles = files.filter(file => file.type.startsWith("image/"));

            if (imageFiles.length === 0) {
                showToast("未选择图片文件");
                return;
            }

            imageFiles.forEach(file => {
                const reader = new FileReader();
                reader.onload = e => {
                    const dataUrl = e.target.result;
                    const fileName = file.name;
                    const newItem = {
                        id: `work_${Date.now()}_${Math.random().toString(36).substr(2, 9)}`,
                        src: dataUrl,
                        title: fileName.replace(/\.[^/.]+$/, ""),
                        aspectRatio: "1/1"
                    };

                    GALLERY_CONFIG.push(newItem);
                    state.selectedPhotos.push(fileName);
                    updateConfirmButton();
                };
                reader.readAsDataURL(file);
            });

            showToast(`已选择 ${imageFiles.length} 张图片`);
            fileInput.value = "";
        }

        function handleDragOver(event) {
            event.preventDefault();
            uploadArea.classList.add("is-dragover");
        }

        function handleDragLeave(event) {
            event.preventDefault();
            uploadArea.classList.remove("is-dragover");
        }

        function handleDrop(event) {
            event.preventDefault();
            uploadArea.classList.remove("is-dragover");

            const files = Array.from(event.dataTransfer.files || []);
            const imageFiles = files.filter(file => file.type.startsWith("image/"));

            if (imageFiles.length === 0) {
                showToast("未选择图片文件");
                return;
            }

            imageFiles.forEach(file => {
                const reader = new FileReader();
                reader.onload = e => {
                    const dataUrl = e.target.result;
                    const fileName = file.name;
                    const newItem = {
                        id: `work_${Date.now()}_${Math.random().toString(36).substr(2, 9)}`,
                        src: dataUrl,
                        title: fileName.replace(/\.[^/.]+$/, ""),
                        aspectRatio: "1/1"
                    };

                    GALLERY_CONFIG.push(newItem);
                    state.selectedPhotos.push(fileName);
                    updateConfirmButton();
                };
                reader.readAsDataURL(file);
            });

            showToast(`已拖放 ${imageFiles.length} 张图片`);
        }

        function confirmAddPhotos() {
            state.selectedPhotos.forEach(path => {
                const existingItem = GALLERY_CONFIG.find(item => item.src === path || item.src === "photos/" + path);
                if (!existingItem) {
                    const isDataUrl = path.startsWith("data:");
                    const newItem = {
                        id: `work_${Date.now()}_${Math.random().toString(36).substr(2, 9)}`,
                        src: isDataUrl ? path : "photos/" + path,
                        title: isDataUrl ? "新作品" : path.replace(/\.[^/.]+$/, ""),
                        aspectRatio: "1/1"
                    };

                    GALLERY_CONFIG.push(newItem);
                }
            });

            closeMediaManager();
            renderGallery();
            showToast(`已添加 ${state.selectedPhotos.length} 件作品`);
        }

        addButton.addEventListener("click", openMediaManager);
        mediaManagerClose.addEventListener("click", closeMediaManager);
        mediaManagerCancel.addEventListener("click", closeMediaManager);
        mediaManagerConfirm.addEventListener("click", confirmAddPhotos);
        fileInput.addEventListener("change", handleFileSelect);
        uploadArea.addEventListener("dragover", handleDragOver);
        uploadArea.addEventListener("dragleave", handleDragLeave);
        uploadArea.addEventListener("drop", handleDrop);

        mediaManager.addEventListener("click", event => {
            if (event.target === mediaManager) {
                closeMediaManager();
            }
        });

        document.addEventListener("keydown", event => {
            if (!mediaManager.classList.contains("is-open")) return;

            if (event.key === "Escape") {
                closeMediaManager();
            }

            if (event.key === "Enter" && !mediaManagerConfirm.disabled) {
                confirmAddPhotos();
            }
        });

        /* =========================================================
           07. 大图预览
           ========================================================= */
        function renderCollectionThumbs(item) {
            const group = collectionMap[item.collectionId] || [];
            collectionList.hidden = group.length <= 1;

            if (group.length <= 1) {
                collectionThumbs.innerHTML = "";
                return;
            }

            collectionThumbs.innerHTML = group.map(groupItem => `
                <button
                    class="collection-thumb ${groupItem.id === item.id ? "is-active" : ""}"
                    type="button"
                    data-thumb-id="${escapeHTML(groupItem.id)}"
                    aria-label="${escapeHTML(groupItem.title || "作品")}"
                >
                    ${createSearchThumb(groupItem)}
                </button>
            `).join("");

            collectionThumbs.querySelectorAll("[data-thumb-id]").forEach(button => {
                button.addEventListener("click", () => {
                    const nextItem = GALLERY_CONFIG.find(entry => entry.id === button.dataset.thumbId);
                    if (nextItem) {
                        updateLightbox(nextItem, 1);
                    }
                });
            });
        }

        function updateLightbox(item, direction = 0) {
            const index = getItemIndex(item);
            state.currentIndex = Math.max(0, index);

            lightboxMediaWrap.style.opacity = "0";
            lightboxMediaWrap.style.transform = `translateX(${direction * 18}px) scale(.992)`;

            window.setTimeout(() => {
                if (item.src) {
                    lightboxImage.src = item.src;
                    lightboxImage.alt = item.title || "作品";
                    lightboxImage.hidden = false;
                    lightboxPlaceholder.hidden = true;
                } else {
                    lightboxImage.hidden = true;
                    lightboxImage.removeAttribute("src");
                    lightboxPlaceholder.hidden = false;
                    lightboxPlaceholder.style.cssText = getPaletteStyle(item);
                }

                lightboxCollection.textContent = item.collectionName || "";
                lightboxTitle.textContent = item.title || "";
                lightboxModel.textContent = item.model || "";
                lightboxDescription.textContent = item.description || "";
                lightboxMetaSeries.textContent = item.collectionName || "";
                lightboxMetaModel.textContent = item.model || "";
                lightboxMetaIndex.textContent = padNumber(index + 1);
                lightboxPosition.textContent = `${padNumber(index + 1)} / ${padNumber(GALLERY_CONFIG.length)}`;

                renderCollectionThumbs(item);
                applyLightboxAspect(item);

                requestAnimationFrame(() => {
                    lightboxMediaWrap.style.opacity = "1";
                    lightboxMediaWrap.style.transform = "translateX(0) scale(1)";
                });
            }, 160);
        }

        function applyLightboxAspect(item) {
            if (!item.src) {
                lightboxMediaWrap.style.removeProperty("--lightbox-aspect");
                return;
            }
            detectImageAspect(item.src).then(ratio => {
                if (ratio) {
                    lightboxMediaWrap.style.setProperty("--lightbox-aspect", ratio);
                }
            });
        }

        function openLightbox(item) {
            state.lastFocusedElement = document.activeElement;
            updateLightbox(item, 0);
            lightbox.classList.add("is-open");
            lightbox.setAttribute("aria-hidden", "false");
            body.classList.add("is-locked");
            lightboxClose.focus({ preventScroll: true });
        }

        function closeLightbox() {
            lightbox.classList.remove("is-open");
            lightbox.setAttribute("aria-hidden", "true");
            body.classList.remove("is-locked");
            state.lastFocusedElement?.focus?.({ preventScroll: true });
        }

        function moveLightbox(step) {
            const nextIndex = (state.currentIndex + step + GALLERY_CONFIG.length) % GALLERY_CONFIG.length;
            updateLightbox(GALLERY_CONFIG[nextIndex], step);
        }

        lightboxClose.addEventListener("click", closeLightbox);
        lightboxPrev.addEventListener("click", () => moveLightbox(-1));
        lightboxNext.addEventListener("click", () => moveLightbox(1));

        lightbox.addEventListener("click", event => {
            if (event.target === lightbox || event.target.id === "lightbox-stage") {
                closeLightbox();
            }
        });

        document.addEventListener("keydown", event => {
            if (!lightbox.classList.contains("is-open")) return;

            if (event.key === "Escape") {
                closeLightbox();
            }

            if (event.key === "ArrowLeft") {
                moveLightbox(-1);
            }

            if (event.key === "ArrowRight") {
                moveLightbox(1);
            }
        });

        let touchStartX = 0;
        let touchStartY = 0;

        lightbox.addEventListener("touchstart", event => {
            const touch = event.touches[0];
            touchStartX = touch.clientX;
            touchStartY = touch.clientY;
        }, { passive: true });

        lightbox.addEventListener("touchend", event => {
            const touch = event.changedTouches[0];
            const deltaX = touch.clientX - touchStartX;
            const deltaY = touch.clientY - touchStartY;

            if (Math.abs(deltaX) > 60 && Math.abs(deltaX) > Math.abs(deltaY)) {
                moveLightbox(deltaX > 0 ? -1 : 1);
            }
        }, { passive: true });

        /* =========================================================
           08. 动画与页面行为
           ========================================================= */
        function observeWorkCards() {
            const cards = galleryGrid.querySelectorAll(".work-card");

            if (!("IntersectionObserver" in window)) {
                cards.forEach(card => card.classList.add("is-visible"));
                return;
            }

            const observer = new IntersectionObserver(entries => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        const card = entry.target;
                        const visibleIndex = [...cards].indexOf(card);
                        window.setTimeout(() => {
                            card.classList.add("is-visible");
                        }, Math.min(visibleIndex % 4, 3) * 90);
                        observer.unobserve(card);
                    }
                });
            }, {
                threshold: 0.08,
                rootMargin: "0px 0px -5% 0px"
            });

            cards.forEach(card => observer.observe(card));
        }

        function observeRevealElements() {
            const items = document.querySelectorAll(".reveal-on-scroll");

            if (!("IntersectionObserver" in window)) {
                items.forEach(item => item.style.opacity = "1");
                return;
            }

            const observer = new IntersectionObserver(entries => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        entry.target.animate(
                            [
                                { opacity: 0, transform: "translateY(24px)" },
                                { opacity: 1, transform: "translateY(0)" }
                            ],
                            {
                                duration: 900,
                                easing: "cubic-bezier(.16,1,.3,1)",
                                fill: "forwards"
                            }
                        );
                        observer.unobserve(entry.target);
                    }
                });
            }, { threshold: 0.12 });

            items.forEach(item => {
                item.style.opacity = "0";
                observer.observe(item);
            });
        }

        function playHeroIntro() {
            const items = document.querySelectorAll(".reveal-item");
            items.forEach((item, index) => {
                item.animate(
                    [
                        { opacity: 0, transform: "translateY(26px)" },
                        { opacity: 1, transform: "translateY(0)" }
                    ],
                    {
                        duration: 1050,
                        delay: 120 + index * 120,
                        easing: "cubic-bezier(.16,1,.3,1)",
                        fill: "both"
                    }
                );
            });
        }

        function handleScroll() {
            const maxScroll = Math.max(document.documentElement.scrollHeight - window.innerHeight, 1);
            const progress = (window.scrollY / maxScroll) * 100;
            root.style.setProperty("--scroll-progress", `${progress}%`);
            siteHeader.classList.toggle("is-scrolled", window.scrollY > 20);
            backTop.classList.toggle("is-visible", window.scrollY > window.innerHeight * 0.75);
        }

        window.addEventListener("scroll", handleScroll, { passive: true });

        window.addEventListener("mousemove", event => {
            root.style.setProperty("--cursor-x", `${event.clientX}px`);
            root.style.setProperty("--cursor-y", `${event.clientY}px`);
        }, { passive: true });

        backTop.addEventListener("click", () => {
            window.scrollTo({ top: 0, behavior: "smooth" });
        });

        /* =========================================================
           09. 初始化
           ========================================================= */
        function autoLoadPhotos() {
            const imageExtensions = ["jpg", "jpeg", "png", "gif", "webp"];

            fetch("photos/")
                .then(response => response.text())
                .then(html => {
                    const parser = new DOMParser();
                    const doc = parser.parseFromString(html, "text/html");
                    const links = doc.querySelectorAll("a");
                    const photoFiles = [];

                    links.forEach(link => {
                        const href = link.getAttribute("href");
                        if (href && !href.startsWith("..") && !href.startsWith("/")) {
                            const ext = href.split(".").pop()?.toLowerCase();
                            if (imageExtensions.includes(ext)) {
                                photoFiles.push(href);
                            }
                        }
                    });

                    photoFiles.forEach(file => {
                        const newItem = {
                            id: `work_${Date.now()}_${Math.random().toString(36).substr(2, 9)}`,
                            src: "photos/" + file,
                            title: file.replace(/\.[^/.]+$/, ""),
                            aspectRatio: "1/1"
                        };
                        GALLERY_CONFIG.push(newItem);
                    });

                    if (photoFiles.length > 0) {
                        renderGallery();
                        renderSearchResults();
                        showToast(`已自动加载 ${photoFiles.length} 张图片`);
                    }
                })
                .catch(() => {
                    if (!GALLERY_CONFIG.length) {
                        showToast("请将图片放入 photos 文件夹或使用添加按钮上传");
                    }
                });
        }

        function init() {
            renderGallery();
            renderSearchResults();
            playHeroIntro();
            observeRevealElements();
            handleScroll();
            autoLoadPhotos();
        }

        init();
    </script>
</body>
